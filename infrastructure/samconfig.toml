version = 0.1

# ==========================================
# DEFAULT CONFIGURATION
# ==========================================
[default]
[default.global.parameters]
stack_name = "ai-doc-assistant"
region = "ap-southeast-1"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "ai-doc-assistant"
image_repositories = []
parameter_overrides = "Environment=\"dev\" AllowedOrigins=\"*\""

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

# ==========================================
# DEV ENVIRONMENT
# ==========================================
[dev]
[dev.deploy.parameters]
stack_name = "ai-doc-assistant-dev"
region = "ap-southeast-1"
s3_bucket = "ai-doc-assistant-dev-010928183602"
parameter_overrides = "Environment=dev AllowedOrigins=*"
tags = "Environment=dev Project=AI-Document-Assistant ManagedBy=SAM"

# ==========================================
# STAGING ENVIRONMENT
# ==========================================
[staging]
[staging.deploy.parameters]
stack_name = "ai-doc-assistant-staging"
region = "ap-southeast-1"
parameter_overrides = "Environment=staging AllowedOrigins=https://staging.yourdomain.com"
tags = "Environment=staging Project=AI-Document-Assistant ManagedBy=SAM"

# ==========================================
# PRODUCTION ENVIRONMENT
# ==========================================
[prod]
[prod.deploy.parameters]
stack_name = "ai-doc-assistant-prod"
region = "ap-southeast-1"
parameter_overrides = "Environment=prod AllowedOrigins=https://yourdomain.com"
confirm_changeset = true  # Extra safety in prod
tags = "Environment=prod Project=AI-Document-Assistant ManagedBy=SAM"