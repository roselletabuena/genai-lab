AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI Document Assistant - RAG System Storage Layer

# ==========================================
# PARAMETERS
# ==========================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment

  AllowedOrigins:
    Type: String
    Default: "https://ai-document-assistant-six.vercel.app"
    Description: CORS allowed origins (comma-separated for multiple origins)
# ==========================================
# RESOURCES
# ==========================================
Resources:
  # ------------------------------------------
  # API Gateway
  # ------------------------------------------
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "ai-doc-assistant-api-${Environment}"
      StageName: !Ref Environment
      BinaryMediaTypes:
        - "multipart/form-data"
        - "application/pdf"
        - "application/octet-stream"
        - "*/*"
      TracingEnabled: true
      Tags:
        Environment: !Ref Environment
  # ------------------------------------------
  # S3 Bucket
  # ------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-doc-assistant-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref AllowedOrigins
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # DynamoDB Tables
  # ------------------------------------------
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Documents-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: N
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ConversationHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ai-doc-assistant-conversations-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Chunks-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chunkId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: chunkId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DocumentIdIndex
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # Lambda Function
  # ------------------------------------------
  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ai-doc-assistant-api-${Environment}"
      Handler: lambda.handler
      Runtime: nodejs20.x
      CodeUri: ../backend/dist/
      MemorySize: 512
      Timeout: 30
      Role: !GetAtt AppRole.Arn
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          DOCUMENTS_TABLE: !Ref DocumentsTable
          CHUNKS_TABLE: !Ref ChunksTable
          BEDROCK_GUARDRAIL_ID: !GetAtt PortfolioGuardrail.GuardrailId
      Events:
        # Root endpoint
        RootGet:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: GET

        # Documents endpoints
        ListDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET

        Portfolio:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /portfolio/chat
            Method: POST

        UploadDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/upload
            Method: POST

        # Catch-all for Fastify routing
        ProxyRequest:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
      Tags:
        Environment: !Ref Environment

  # ------------------------------------------
  # IAM Role
  # ------------------------------------------
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: AppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub "${DocumentsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - "dynamodb:GetItem"
                  - "dynamodb:PutItem"
                  - "dynamodb:UpdateItem"
                  - "dynamodb:DeleteItem"
                  - "dynamodb:Query"
                  - "dynamodb:BatchWriteItem"
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !Sub "${DocumentsTable.Arn}/index/*"
                  - !GetAtt ChunksTable.Arn
                  - !Sub "${ChunksTable.Arn}/index/*"
                  - !GetAtt ConversationHistoryTable.Arn
                  - !Sub "${ConversationHistoryTable.Arn}/index/"
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:ApplyGuardrail"
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/us.anthropic.claude-3-5-haiku-20241022-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*"

  # ------------------------------------------
  # Bedrock Guardrail
  # ------------------------------------------
  PortfolioGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "portfolio-guardrail-${Environment}"
      Description: "Guardrail for portfolio AI assistant to block off-topic and unsafe queries"
      BlockedInputMessaging: "Portfolio questions only, please! 😊"
      BlockedOutputsMessaging: "Portfolio questions only, please! 😊"
      TopicPolicyConfig:
        TopicsConfig:
          - Name: "politics"
            Definition: "Political discussions including elections, political parties, government policies, political opinions, or public political figures."
            Type: "DENY"
          - Name: "personal information"
            Definition: "Requests for private or sensitive personal information such as phone numbers, home addresses, passwords, identification numbers, salary, expected salary or confidential details."
            Type: "DENY"
          - Name: "medical advice"
            Definition: "Health or medical guidance including diagnosis, treatments, medications, or advice related to medical conditions or healthcare decisions."
            Type: "DENY"
          - Name: "illegal activities"
            Definition: "Requests for instructions or guidance related to illegal activities including hacking, fraud, bypassing security systems, or other unlawful actions."
            Type: "DENY"
          - Name: "financial advice"
            Definition: "Guidance or recommendations related to investing, financial planning, trading, managing money, or financial decision making."
            Type: "DENY"
      ContextualGroundingPolicyConfig:
        FiltersConfig:
          - Type: "GROUNDING"
            Threshold: 0.7
            Action: "BLOCK"

# ==========================================
# OUTPUTS
# ==========================================
Outputs:
  DocumentsBucketName:
    Value: !Ref DocumentsBucket

  DocumentsTableName:
    Value: !Ref DocumentsTable

  ChunksTableName:
    Value: !Ref ChunksTable

  AppRoleArn:
    Value: !GetAtt AppRole.Arn

  Region:
    Value: !Ref AWS::Region

  ApiGatewayUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"

  ApiGatewayId:
    Description: "API Gateway ID"
    Value: !Ref ApiGateway

  DocumentsFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt DocumentsFunction.Arn
