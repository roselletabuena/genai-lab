AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI Portfolio

# ==========================================
# PARAMETERS
# ==========================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment
  InternalApiKey:
    Type: String
    NoEcho: true
    Description: Secret key sent by Next.js server to API Gateway

  AllowedOrigins:
    Type: String
    Default: "https://ai-document-assistant-six.vercel.app,https://roselle.dev"
    Description: CORS allowed origins (comma-separated for multiple origins)
# ==========================================
# RESOURCES
# ==========================================
Resources:
  # ------------------------------------------
  # API Gateway
  # ------------------------------------------

  ApiAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "my-ai-stack-authorizer-${Environment}"
      Handler: authorizer.handler
      Runtime: nodejs22.x
      CodeUri: ../backend/dist/
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          INTERNAL_API_KEY: !Ref InternalApiKey

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "my-ai-stack-api-${Environment}"
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: InternalApiAuthorizer
        Authorizers:
          InternalApiAuthorizer:
            FunctionArn: !GetAtt ApiAuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - x-internal-api-key
              ReauthorizeEvery: 0
      BinaryMediaTypes:
        - "multipart/form-data"
        - "application/pdf"
        - "application/octet-stream"
        - "*/*"
      TracingEnabled: true
      Tags:
        Environment: !Ref Environment

  # ------------------------------------------
  # S3 Bucket
  # ------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "my-ai-stack-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Split [",", !Ref AllowedOrigins]
            AllowedMethods:
              - GET
              - PUT
              - POST
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # DynamoDB Tables
  # ------------------------------------------
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Documents-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: N
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Chunks-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chunkId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: chunkId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DocumentIdIndex
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # Lambda Function
  # ------------------------------------------
  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "my-ai-stack-api-${Environment}"
      Handler: lambda.handler
      Runtime: nodejs22.x
      CodeUri: ../backend/dist/
      MemorySize: 512
      Timeout: 30
      Role: !GetAtt AppRole.Arn
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          DOCUMENTS_TABLE: !Ref DocumentsTable
          CHUNKS_TABLE: !Ref ChunksTable
          BEDROCK_GUARDRAIL_ID: !GetAtt PortfolioGuardrail.GuardrailId
          KNOWLEDGE_BASE_ID: !Ref PortfolioKnowledgeBase
      Events:
        # Root endpoint
        RootGet:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: GET

        # Documents endpoints
        ListDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET

        Portfolio:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /portfolio/chat
            Method: POST

        UploadDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/upload
            Method: POST

        # Catch-all for Fastify routing
        ProxyRequest:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
      Tags:
        Environment: !Ref Environment

  # ------------------------------------------
  # IAM Role
  # ------------------------------------------
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: AppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub "${DocumentsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - "dynamodb:GetItem"
                  - "dynamodb:PutItem"
                  - "dynamodb:UpdateItem"
                  - "dynamodb:DeleteItem"
                  - "dynamodb:Query"
                  - "dynamodb:BatchWriteItem"
                  - "bedrock:Retrieve"
                  - "bedrock:RetrieveAndGenerate"
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !Sub "${DocumentsTable.Arn}/index/*"
                  - !GetAtt ChunksTable.Arn
                  - !Sub "${ChunksTable.Arn}/index/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:ApplyGuardrail"
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*"
                  - !Sub "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*"
              - Effect: Allow
                Action:
                  - "s3vectors:GetIndex"
                  - "s3vectors:QueryVectors"
                  - "s3vectors:GetVectors"
                Resource:
                  - !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/portfolio-vectors-${Environment}-${AWS::AccountId}/index/portfolio-index"

  # ------------------------------------------
  # Bedrock Guardrail
  # ------------------------------------------
  PortfolioGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "portfolio-guardrail-${Environment}"
      Description: "Guardrail for portfolio AI assistant to block off-topic and unsafe queries"
      BlockedInputMessaging: "Portfolio questions only, please! 😊"
      BlockedOutputsMessaging: "Portfolio questions only, please! 😊"
      TopicPolicyConfig:
        TopicsConfig:
          - Name: "completely-unrelated"
            Definition: "Topics unrelated to Roselle Tabuena's professional background, skills, work history, or career as a software engineer"
            Examples:
              - "What is the capital of France?"
              - "Help me write a Python script."
              - "What is your expected salary?"
              - "Explain how black holes work."
            Type: "DENY"
          - Name: "personal-or-sensitive"
            Definition: >
              Questions asking for personal information, salary expectations, or anything unrelated to professional qualifications.
            Examples:
              - "What is your expected salary?"
              - "How old is Roselle?"
              - "Is Roselle married?"
              - "Where does Roselle live?"
            Type: "DENY"
      ContentPolicyConfig:
        FiltersConfig:
          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
          - Type: "INSULTS"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"

  # ------------------------------------------
  # S3 Vectors (Vector Store)
  # ------------------------------------------
  PortfolioVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Sub "portfolio-vectors-${Environment}-${AWS::AccountId}"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  PortfolioVectorIndex:
    Type: AWS::S3Vectors::Index
    Properties:
      VectorBucketArn: !GetAtt PortfolioVectorBucket.VectorBucketArn
      IndexName: "portfolio-index"
      Dimension: 1024
      DataType: float32
      DistanceMetric: cosine

  # ------------------------------------------
  # IAM Role for Knowledge Base
  # ------------------------------------------
  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "portfolio-kb-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: KnowledgeBaseAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub "${DocumentsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
              - Effect: Allow
                Action:
                  - "s3vectors:PutVectors"
                  - "s3vectors:GetVectors"
                  - "s3vectors:DeleteVectors"
                  - "s3vectors:QueryVectors"
                  - "s3vectors:ListVectors"
                Resource:
                  - !Sub "arn:aws:s3vectors:${AWS::Region}:${AWS::AccountId}:bucket/portfolio-vectors-${Environment}-${AWS::AccountId}/index/portfolio-index"

  # ------------------------------------------
  # Bedrock Knowledge Base
  # ------------------------------------------
  PortfolioKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn: PortfolioVectorIndex
    Properties:
      Name: !Sub "portfolio-kb-${Environment}"
      Description: "Knowledge base for Roselle's portfolio documents"
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          IndexArn: !GetAtt PortfolioVectorIndex.IndexArn

  PortfolioDataSource:
    Type: AWS::Bedrock::DataSource
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "portfolio-docs-${Environment}-${AWS::StackName}"
      KnowledgeBaseId: !Ref PortfolioKnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt DocumentsBucket.Arn
          InclusionPrefixes:
            - "portfolio/"
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 400
            OverlapPercentage: 10
# ==========================================
# OUTPUTS
# ==========================================
Outputs:
  DocumentsBucketName:
    Value: !Ref DocumentsBucket

  AppRoleArn:
    Value: !GetAtt AppRole.Arn

  Region:
    Value: !Ref AWS::Region

  ApiGatewayUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"

  ApiGatewayId:
    Description: "API Gateway ID"
    Value: !Ref ApiGateway

  DocumentsFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt DocumentsFunction.Arn

  KnowledgeBaseId:
    Value: !Ref PortfolioKnowledgeBase

  VectorBucketName:
    Value: !Sub "portfolio-vectors-${Environment}-${AWS::AccountId}"
