AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI Document Assistant - RAG System Storage Layer

# ==========================================
# PARAMETERS
# ==========================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment

  AllowedOrigins:
    Type: String
    Default: "*"
    Description: CORS allowed origins

# ==========================================
# RESOURCES
# ==========================================
Resources:
  # ------------------------------------------
  # API Gateway
  # ------------------------------------------
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "ai-doc-assistant-api-${Environment}"
      StageName: !Ref Environment
      Cors:
        AllowOrigin: !Sub "'${AllowedOrigins}'"
        AllowHeaders: "'Content-Type,X-Api-Key,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        MaxAge: "'3600'"
      TracingEnabled: true
      Tags:
        Environment: !Ref Environment
  # ------------------------------------------
  # S3 Bucket
  # ------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-doc-assistant-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref AllowedOrigins
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # DynamoDB Tables
  # ------------------------------------------
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Documents-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: N
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Chunks-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chunkId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: chunkId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DocumentIdIndex
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # Lambda Function
  # ------------------------------------------
  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ai-doc-assistant-api-${Environment}"
      Handler: lambda.handler
      Runtime: nodejs20.x
      CodeUri: ../backend/dist/
      MemorySize: 512
      Timeout: 30
      Role: !GetAtt AppRole.Arn
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          DOCUMENTS_TABLE: !Ref DocumentsTable
          CHUNKS_TABLE: !Ref ChunksTable
      Events:
        # Root endpoint
        RootGet:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: GET
        
        # Documents endpoints
        ListDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET
        
        UploadDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/upload
            Method: POST
        
        # Catch-all for Fastify routing
        ProxyRequest:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
      Tags:
        Environment: !Ref Environment

  # ------------------------------------------
  # IAM Role
  # ------------------------------------------
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: AppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                Resource: !Sub "${DocumentsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - "dynamodb:GetItem"
                  - "dynamodb:PutItem"
                  - "dynamodb:UpdateItem"
                  - "dynamodb:DeleteItem"
                  - "dynamodb:Query"
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !Sub "${DocumentsTable.Arn}/index/*"
                  - !GetAtt ChunksTable.Arn
                  - !Sub "${ChunksTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                Resource: "*"

# ==========================================
# OUTPUTS
# ==========================================
Outputs:
  DocumentsBucketName:
    Value: !Ref DocumentsBucket

  DocumentsTableName:
    Value: !Ref DocumentsTable

  ChunksTableName:
    Value: !Ref ChunksTable

  AppRoleArn:
    Value: !GetAtt AppRole.Arn

  Region:
    Value: !Ref AWS::Region

  ApiGatewayUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"

  ApiGatewayId:
    Description: "API Gateway ID"
    Value: !Ref ApiGateway

  DocumentsFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt DocumentsFunction.Arn