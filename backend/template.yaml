AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Document Assistant - RAG System with Bedrock

# ==========================================
# PARAMETERS
# ==========================================
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment
  
  AllowedOrigins:
    Type: String
    Default: '*'
    Description: CORS allowed origins (use specific domain in prod)

# ==========================================
# GLOBALS - Applied to all functions
# ==========================================
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - arm64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DOCUMENTS_TABLE: !Ref DocumentsTable
        CHUNKS_TABLE: !Ref ChunksTable
        DOCUMENTS_BUCKET: !Ref DocumentsBucket
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
    Tracing: Active
  
  Api:
    Cors:
      AllowOrigin: !Sub "'${AllowedOrigins}'"
      AllowHeaders: "'Content-Type,X-Api-Key,Authorization'"
      AllowMethods: "'GET,POST,DELETE,OPTIONS'"

# ==========================================
# RESOURCES
# ==========================================
Resources:

  # ------------------------------------------
  # S3 BUCKET - Document Storage
  # ------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-doc-assistant-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref AllowedOrigins
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - '*'
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ProcessDocumentFunction.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: AI-Document-Assistant

  # ------------------------------------------
  # DynamoDB Tables
  # ------------------------------------------
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Documents-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: N
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UploadedAtIndex
          KeySchema:
            - AttributeName: uploadedAt
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Chunks-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chunkId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: chunkId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DocumentIdIndex
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------
  # API Gateway
  # ------------------------------------------
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'ai-doc-assistant-api-${Environment}'
      StageName: !Ref Environment
      Auth:
        ApiKeyRequired: true
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      Tags:
        Environment: !Ref Environment

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub 'ai-doc-assistant-key-${Environment}'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref ApiGateway
          StageName: !Ref Environment

  # ------------------------------------------
  # Lambda Functions
  # ------------------------------------------
  UploadDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ai-doc-assistant-upload-${Environment}'
      CodeUri: ./dist
      Handler: handlers/uploadDocument.handler
      Events:
        UploadApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: POST
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable

  ListDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ai-doc-assistant-list-${Environment}'
      CodeUri: ./dist
      Handler: handlers/listDocuments.handler
      Events:
        ListApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable

  DeleteDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ai-doc-assistant-delete-${Environment}'
      CodeUri: ./dist
      Handler: handlers/deleteDocument.handler
      Events:
        DeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/{documentId}
            Method: DELETE
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChunksTable

  ProcessDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ai-doc-assistant-process-${Environment}'
      CodeUri: ./dist
      Handler: handlers/processDocument.handler
      Timeout: 300
      MemorySize: 1024
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChunksTable

  ProcessDocumentFunctionS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessDocumentFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt DocumentsBucket.Arn

  QueryDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ai-doc-assistant-query-${Environment}'
      CodeUri: ./dist
      Handler: handlers/queryDocument.handler
      Timeout: 60
      MemorySize: 1024
      Events:
        QueryApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /query
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChunksTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-sonnet-4-*'

# ==========================================
# OUTPUTS
# ==========================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
  
  ApiKeyId:
    Description: API Key ID
    Value: !Ref ApiKey
  
  DocumentsBucketName:
    Description: S3 bucket for documents
    Value: !Ref DocumentsBucket
  
  DocumentsTableName:
    Description: DynamoDB Documents table
    Value: !Ref DocumentsTable
  
  ChunksTableName:
    Description: DynamoDB Chunks table
    Value: !Ref ChunksTable
  
  Region:
    Description: Deployment region
    Value: !Ref AWS::Region
